[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# --- INICIO DE CONFIGURACIÓN DEL CRONJOB ---
# Se ejecuta Lunes y Miércoles a las 13:00 UTC (8:00 AM hora de Panamá)
[functions."cron-mining"]
  schedule = "0 13 * * 1,3"
# --- FIN DE CONFIGURACIÓN DEL CRONJOB ---

[functions."renderQuotePdf"]
  included_files = [
    "public/brand/**"
  ]

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Authorization, Content-Type, Cache-Control, X-Requested-With, Accept"
    Access-Control-Allow-Methods = "GET, POST, PUT, PATCH, DELETE, OPTIONS"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200